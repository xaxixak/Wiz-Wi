<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace Intelligence - Graph Viewer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
/* ======================================================================
   CSS: Dark theme, CSS Grid layout
   ====================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary:   #1a1a2e;
  --bg-secondary: #16213e;
  --bg-panel:     #0f3460;
  --text-primary: #e0e0e0;
  --text-muted:   #8899aa;
  --accent:       #4A90D9;
  --border:       #2a3a5e;
  --tier-macro:   #4A90D9;
  --tier-meso:    #50C878;
  --tier-micro:   #FF8C42;
  --edge-structural:   #888;
  --edge-operational:  #4A90D9;
  --edge-event:        #9B59B6;
}

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

#app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

/* --- Toolbar --- */
#toolbar {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--border);
}

#toolbar h1 {
  font-size: 16px;
  font-weight: 600;
  white-space: nowrap;
}

#search-box {
  flex: 0 0 260px;
  padding: 6px 10px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-primary);
  font-size: 13px;
}
#search-box:focus { outline: none; border-color: var(--accent); }
#search-box::placeholder { color: var(--text-muted); }

.toolbar-stats {
  font-size: 12px;
  color: var(--text-muted);
  margin-left: auto;
  white-space: nowrap;
}

/* --- Sidebar --- */
#sidebar {
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.filter-section h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.filter-group label {
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
}
.filter-group label:hover { background: rgba(255,255,255,0.05); }

.filter-group input[type="checkbox"] {
  accent-color: var(--accent);
}

.color-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* --- Detail Panel --- */
#detail-panel {
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  padding: 12px;
  overflow-y: auto;
  max-height: 280px;
}

#detail-panel.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 13px;
  font-style: italic;
}

#detail-panel h3 {
  font-size: 14px;
  margin-bottom: 8px;
}

.detail-grid {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 4px 12px;
  font-size: 12px;
}

.detail-grid .label {
  color: var(--text-muted);
  text-align: right;
}

.detail-grid .value {
  word-break: break-all;
}

.tag-badge {
  display: inline-block;
  background: rgba(74, 144, 217, 0.2);
  border: 1px solid rgba(74, 144, 217, 0.4);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 10px;
  margin: 1px 2px;
}

/* --- Graph container --- */
#graph-container {
  position: relative;
  overflow: hidden;
  background: var(--bg-primary);
}

#graph-container svg {
  width: 100%;
  height: 100%;
}

/* --- SVG styling --- */
.node-group { cursor: pointer; }
.node-group:hover .node-shape { filter: brightness(1.3); }

.node-label {
  font-size: 10px;
  fill: var(--text-primary);
  text-anchor: middle;
  pointer-events: none;
  user-select: none;
}

.edge-line {
  fill: none;
  stroke-width: 1.2;
}

.edge-label {
  font-size: 9px;
  fill: var(--text-muted);
  pointer-events: none;
  opacity: 0;
  user-select: none;
}

.edge-group:hover .edge-label { opacity: 1; }
.edge-group:hover .edge-line { stroke-width: 2.5; }

/* --- Tooltip --- */
.tooltip {
  position: absolute;
  background: rgba(15, 52, 96, 0.95);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font-size: 12px;
  pointer-events: none;
  z-index: 100;
  max-width: 300px;
  display: none;
}
.tooltip .tt-name { font-weight: 600; }
.tooltip .tt-type { color: var(--text-muted); font-size: 11px; }

/* --- Selected node highlight --- */
.node-selected .node-shape {
  stroke: #fff !important;
  stroke-width: 3 !important;
}

/* --- Live update node highlights --- */
@keyframes node-added-pulse {
  0% { opacity: 0; transform: scale(0.5); }
  50% { transform: scale(1.2); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes node-modified-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes node-removed-fade {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.5); }
}

.node-added .node-shape {
  animation: node-added-pulse 0.6s ease-out;
  filter: drop-shadow(0 0 8px #4ecca3);
}

.node-modified .node-shape {
  animation: node-modified-pulse 1s ease-in-out 3;
  filter: drop-shadow(0 0 8px #f9ca24);
}

.node-removed .node-shape {
  animation: node-removed-fade 0.5s ease-out forwards;
  filter: drop-shadow(0 0 8px #e94560);
}

/* --- Runtime activity overlay --- */
.runtime-ripple {
  fill: none;
  pointer-events: none;
}

/* Persistent glow on active runtime nodes */
@keyframes runtime-glow-pulse {
  0%, 100% { filter: drop-shadow(0 0 6px #ff6b6b) drop-shadow(0 0 12px rgba(255,107,107,0.4)); }
  50% { filter: drop-shadow(0 0 10px #ff6b6b) drop-shadow(0 0 20px rgba(255,107,107,0.6)); }
}

.node-runtime-active .node-shape {
  stroke: #ff6b6b !important;
  stroke-width: 3 !important;
  animation: runtime-glow-pulse 1.5s ease-in-out infinite;
}

.node-runtime-active .node-label {
  fill: #ff6b6b !important;
  font-weight: 700;
}

/* Animated flow path between nodes */
@keyframes runtime-flow-dash {
  to { stroke-dashoffset: -20; }
}

.runtime-flow-line {
  fill: none;
  stroke: #ff6b6b;
  stroke-width: 2.5;
  stroke-dasharray: 6,4;
  animation: runtime-flow-dash 0.6s linear infinite;
  pointer-events: none;
}

.runtime-flow-arrow {
  fill: #ff6b6b;
  pointer-events: none;
}

#runtime-banner {
  position: fixed;
  bottom: 12px;
  right: 12px;
  z-index: 1000;
  background: rgba(26, 26, 46, 0.95);
  border: 1px solid #ff6b6b;
  border-radius: 8px;
  padding: 8px 14px;
  color: #ff6b6b;
  font-size: 12px;
  font-family: 'Consolas', monospace;
  max-width: 400px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.runtime-indicator {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #ff6b6b;
  margin-left: 12px;
}

.runtime-indicator.active { display: flex; }

@keyframes runtime-dot-pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.runtime-dot {
  width: 8px;
  height: 8px;
  background: #ff6b6b;
  border-radius: 50%;
  animation: runtime-dot-pulse 1.5s ease-in-out infinite;
}

/* --- Runtime activity log panel --- */
#runtime-log {
  display: none;
  flex-direction: column;
  gap: 0;
  max-height: 200px;
  overflow-y: auto;
}

#runtime-log.has-events { display: flex; }

.runtime-log-entry {
  font-size: 11px;
  padding: 4px 6px;
  border-bottom: 1px solid rgba(255,107,107,0.1);
  cursor: pointer;
  transition: background 0.15s;
}

.runtime-log-entry:hover { background: rgba(255,107,107,0.1); }

.runtime-log-entry .rle-time {
  color: var(--text-muted);
  font-size: 10px;
  margin-right: 6px;
}

.runtime-log-entry .rle-type {
  font-weight: 600;
  margin-right: 4px;
}

.runtime-log-entry .rle-event { color: #ff9f43; }
.runtime-log-entry .rle-http { color: #4ecca3; }
.runtime-log-entry .rle-http-err { color: #e94560; }

.runtime-log-entry .rle-nodes {
  color: var(--text-muted);
  font-size: 10px;
  display: block;
  margin-top: 2px;
}

.runtime-log-entry .rle-node-tag {
  display: inline-block;
  background: rgba(255,107,107,0.15);
  border: 1px solid rgba(255,107,107,0.3);
  border-radius: 3px;
  padding: 0 4px;
  margin: 1px 2px;
  font-size: 10px;
  color: #ff6b6b;
  cursor: pointer;
}

.runtime-log-entry .rle-node-tag:hover {
  background: rgba(255,107,107,0.3);
}

/* --- Scrollbar --- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* --- Select All/None buttons --- */
.filter-actions {
  display: flex;
  gap: 6px;
  margin-bottom: 4px;
}
.filter-actions button {
  font-size: 10px;
  padding: 2px 6px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 3px;
  cursor: pointer;
}
.filter-actions button:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text-primary);
}
</style>
</head>
<body>
<div id="app">

  <!-- Toolbar -->
  <div id="toolbar">
    <a href="/" style="color:var(--accent);text-decoration:none;font-size:13px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;">&larr; Home</a>
    <h1>Workspace Intelligence</h1>
    <input type="text" id="search-box" placeholder="Search nodes by name..." />
    <span class="toolbar-stats" id="stats-display">Loading...</span>
    <div id="watch-status" style="display:none; margin-left: auto; gap: 10px; align-items: center;">
      <span style="color:#3fb950; font-weight: 600; font-size: 14px;">● LIVE</span>
      <button onclick="stopWatcher()" class="btn-stop-watch" style="background: #da3633; color: #fff; border: none; border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 12px;">Stop Watching</button>
    </div>
    <div id="runtime-status" class="runtime-indicator">
      <span class="runtime-dot"></span>
      <span>RUNTIME</span>
      <span id="runtime-event-count" style="color:#e0e0e0">0 events</span>
    </div>
  </div>

  <!-- Sidebar: filters + detail panel -->
  <div id="sidebar">

    <!-- Tier filter -->
    <div class="filter-section">
      <h3>Tier</h3>
      <div class="filter-actions">
        <button onclick="toggleAll('tier', true)">All</button>
        <button onclick="toggleAll('tier', false)">None</button>
      </div>
      <div class="filter-group" id="tier-filters"></div>
    </div>

    <!-- Node type filter -->
    <div class="filter-section">
      <h3>Node Type</h3>
      <div class="filter-actions">
        <button onclick="toggleAll('nodeType', true)">All</button>
        <button onclick="toggleAll('nodeType', false)">None</button>
      </div>
      <div class="filter-group" id="node-type-filters"></div>
    </div>

    <!-- Edge type filter -->
    <div class="filter-section">
      <h3>Edge Group</h3>
      <div class="filter-actions">
        <button onclick="toggleAll('edgeGroup', true)">All</button>
        <button onclick="toggleAll('edgeGroup', false)">None</button>
      </div>
      <div class="filter-group" id="edge-group-filters"></div>
    </div>

    <!-- Runtime activity log -->
    <div class="filter-section">
      <h3 style="color:#ff6b6b">Runtime Activity</h3>
      <div id="runtime-log"></div>
      <div id="runtime-log-empty" style="font-size:11px;color:var(--text-muted);font-style:italic;">No runtime events yet</div>
    </div>

    <!-- Detail panel -->
    <div id="detail-panel" class="empty">Click a node to see details</div>
  </div>

  <!-- Graph -->
  <div id="graph-container">
    <div class="tooltip" id="tooltip"></div>
  </div>
</div>

<script>
/* ======================================================================
   JavaScript: D3.js force-directed graph viewer
   ====================================================================== */

// -----------------------------------------------------------------------
// Constants from ontology
// -----------------------------------------------------------------------
const TIER_COLORS = {
  macro: '#4A90D9',
  meso:  '#50C878',
  micro: '#FF8C42',
};

// Tier lookup matching ontology.py NODE_TIER
const NODE_TIER = {
  Workspace: 'macro', Project: 'macro', Service: 'macro',
  Resource: 'macro', ExternalAPI: 'macro',
  Module: 'meso', File: 'meso', Router: 'meso',
  Collection: 'meso', InfraConfig: 'meso', Queue: 'meso',
  Endpoint: 'micro', Function: 'micro', AsyncHandler: 'micro',
  DataModel: 'micro', Event: 'micro', Middleware: 'micro',
  TypeDef: 'micro', CacheKey: 'micro', EnvVar: 'micro',
};

// Node category sets (from ontology.py)
const INFRA_TYPES = new Set(['Resource', 'InfraConfig', 'Queue', 'EnvVar']);
const DATA_TYPES  = new Set(['DataModel', 'Collection', 'TypeDef', 'CacheKey']);
// Everything else is "code" category -> circle

// Edge groups matching ontology.py EDGE_GROUPS
const EDGE_GROUPS = {
  structural:    ['CONTAINS', 'DEFINES', 'IMPORTS', 'IMPLEMENTS', 'INHERITS'],
  data_flow:     ['READS_DB', 'WRITES_DB', 'MIGRATES'],
  communication: ['CALLS_API', 'CALLS_SERVICE', 'CALLS', 'WEBHOOK_SEND', 'WEBHOOK_RECEIVE'],
  event_async:   ['EMITS_EVENT', 'CONSUMES_EVENT', 'ENQUEUES', 'DEQUEUES', 'SCHEDULES'],
  caching:       ['CACHE_READ', 'CACHE_WRITE'],
  routing:       ['ROUTES_TO', 'INTERCEPTS', 'VALIDATES', 'AUTHENTICATES'],
  config_deploy: ['DEPENDS_ON', 'DEPLOYED_BY', 'CONFIGURES'],
  quality:       ['TESTS'],
};

// Reverse lookup: edge type -> group
const EDGE_TYPE_TO_GROUP = {};
for (const [group, types] of Object.entries(EDGE_GROUPS)) {
  for (const t of types) EDGE_TYPE_TO_GROUP[t] = group;
}

// Edge group colors
const EDGE_GROUP_COLORS = {
  structural:    '#888888',
  data_flow:     '#4A90D9',
  communication: '#4A90D9',
  event_async:   '#9B59B6',
  caching:       '#E67E22',
  routing:       '#2ECC71',
  config_deploy: '#888888',
  quality:       '#F39C12',
};

// -----------------------------------------------------------------------
// State
// -----------------------------------------------------------------------
let rawData = { nodes: [], edges: [] };
let simulation = null;
let svg, g, linkG, nodeG;
let selectedNodeId = null;

const filters = {
  tier:      { macro: true, meso: true, micro: true },
  nodeType:  {},
  edgeGroup: {},
  search:    '',
};

// -----------------------------------------------------------------------
// Load data
// -----------------------------------------------------------------------
async function loadData() {
  try {
    // Read graph path from URL parameter (set by home page)
    const urlParams = new URLSearchParams(window.location.search);
    const graphPath = urlParams.get('graph');
    const apiUrl = graphPath ? `/api/graph?path=${encodeURIComponent(graphPath)}` : '/api/graph';
    const resp = await fetch(apiUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    rawData = await resp.json();
  } catch (err) {
    console.error('Failed to load graph data:', err);
    rawData = { nodes: [], edges: [] };
    document.getElementById('stats-display').textContent = 'Error loading data';
    return;
  }

  // Normalize: ensure tier field is set from NODE_TIER if missing
  for (const node of rawData.nodes) {
    if (!node.tier) {
      node.tier = NODE_TIER[node.type] || 'micro';
    }
  }

  // Initialize filters with all observed types checked
  const nodeTypes = new Set(rawData.nodes.map(n => n.type));
  for (const t of nodeTypes) filters.nodeType[t] = true;
  for (const g of Object.keys(EDGE_GROUPS)) filters.edgeGroup[g] = true;

  // For large graphs, start with micro tier hidden for better performance
  if (rawData.nodes.length > 200) {
    filters.tier.micro = false;
  }

  buildFilterUI();
  initGraph();
  updateGraph();
  updateStats();
}

// -----------------------------------------------------------------------
// Filter UI
// -----------------------------------------------------------------------
function buildFilterUI() {
  // Tier filters
  const tierContainer = document.getElementById('tier-filters');
  tierContainer.innerHTML = '';
  for (const [tier, color] of Object.entries(TIER_COLORS)) {
    const lbl = document.createElement('label');
    lbl.innerHTML = `
      <input type="checkbox" data-filter="tier" data-value="${tier}" ${filters.tier[tier] ? 'checked' : ''}>
      <span class="color-dot" style="background:${color}"></span>
      ${tier}
    `;
    lbl.querySelector('input').addEventListener('change', onFilterChange);
    tierContainer.appendChild(lbl);
  }

  // Node type filters
  const ntContainer = document.getElementById('node-type-filters');
  ntContainer.innerHTML = '';
  const sortedTypes = Object.keys(filters.nodeType).sort();
  for (const t of sortedTypes) {
    const tier = NODE_TIER[t] || 'micro';
    const color = TIER_COLORS[tier];
    const lbl = document.createElement('label');
    lbl.innerHTML = `
      <input type="checkbox" data-filter="nodeType" data-value="${t}" ${filters.nodeType[t] ? 'checked' : ''}>
      <span class="color-dot" style="background:${color}"></span>
      ${t}
    `;
    lbl.querySelector('input').addEventListener('change', onFilterChange);
    ntContainer.appendChild(lbl);
  }

  // Edge group filters
  const egContainer = document.getElementById('edge-group-filters');
  egContainer.innerHTML = '';
  for (const [group, color] of Object.entries(EDGE_GROUP_COLORS)) {
    const lbl = document.createElement('label');
    lbl.innerHTML = `
      <input type="checkbox" data-filter="edgeGroup" data-value="${group}" ${filters.edgeGroup[group] ? 'checked' : ''}>
      <span class="color-dot" style="background:${color}"></span>
      ${group.replace(/_/g, ' ')}
    `;
    lbl.querySelector('input').addEventListener('change', onFilterChange);
    egContainer.appendChild(lbl);
  }
}

function onFilterChange(e) {
  const filterType = e.target.dataset.filter;
  const value = e.target.dataset.value;
  filters[filterType][value] = e.target.checked;
  updateGraph();
  updateStats();
}

function toggleAll(filterType, state) {
  for (const key of Object.keys(filters[filterType])) {
    filters[filterType][key] = state;
  }
  // Update checkboxes
  document.querySelectorAll(`input[data-filter="${filterType}"]`).forEach(cb => {
    cb.checked = state;
  });
  updateGraph();
  updateStats();
}

// Search
document.getElementById('search-box').addEventListener('input', (e) => {
  filters.search = e.target.value.toLowerCase().trim();
  updateGraph();
});

// -----------------------------------------------------------------------
// Graph init
// -----------------------------------------------------------------------
function initGraph() {
  const container = document.getElementById('graph-container');
  const width = container.clientWidth;
  const height = container.clientHeight;

  svg = d3.select('#graph-container')
    .append('svg')
    .attr('width', width)
    .attr('height', height);

  // Arrow marker definitions
  const defs = svg.append('defs');

  for (const [group, color] of Object.entries(EDGE_GROUP_COLORS)) {
    defs.append('marker')
      .attr('id', `arrow-${group}`)
      .attr('viewBox', '0 -5 10 10')
      .attr('refX', 20)
      .attr('refY', 0)
      .attr('markerWidth', 6)
      .attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path')
        .attr('d', 'M0,-4L8,0L0,4')
        .attr('fill', color);
  }

  // Root group for zoom/pan
  g = svg.append('g');
  linkG = g.append('g').attr('class', 'links');
  nodeG = g.append('g').attr('class', 'nodes');

  // Zoom behavior
  const zoom = d3.zoom()
    .scaleExtent([0.1, 6])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });
  svg.call(zoom);

  // Initialize simulation — optimized for large graphs
  simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d => d.id).distance(60))
    .force('charge', d3.forceManyBody().strength(-120).theta(0.9).distanceMax(300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(12).iterations(1))
    .alphaDecay(0.05)
    .velocityDecay(0.4)
    .on('tick', ticked);
}

// -----------------------------------------------------------------------
// Filtering logic
// -----------------------------------------------------------------------
function getFilteredData() {
  const searchTerm = filters.search;

  // Filter nodes
  const filteredNodes = rawData.nodes.filter(n => {
    const tier = n.tier || NODE_TIER[n.type] || 'micro';
    if (!filters.tier[tier]) return false;
    if (!filters.nodeType[n.type]) return false;
    if (searchTerm && !n.name.toLowerCase().includes(searchTerm) &&
        !n.id.toLowerCase().includes(searchTerm)) return false;
    return true;
  });

  const nodeIdSet = new Set(filteredNodes.map(n => n.id));

  // Filter edges
  const filteredEdges = rawData.edges.filter(e => {
    const srcId = e.source_id || (e.source && e.source.id) || e.source;
    const tgtId = e.target_id || (e.target && e.target.id) || e.target;
    if (!nodeIdSet.has(srcId) || !nodeIdSet.has(tgtId)) return false;
    const group = EDGE_TYPE_TO_GROUP[e.type];
    if (group && !filters.edgeGroup[group]) return false;
    return true;
  });

  return { nodes: filteredNodes, edges: filteredEdges };
}

// -----------------------------------------------------------------------
// Compute edge counts for node sizing
// -----------------------------------------------------------------------
function computeEdgeCounts(nodes, edges) {
  const counts = {};
  for (const n of nodes) counts[n.id] = 0;
  for (const e of edges) {
    const src = e.source_id || e.source;
    const tgt = e.target_id || e.target;
    if (counts[src] !== undefined) counts[src]++;
    if (counts[tgt] !== undefined) counts[tgt]++;
  }
  return counts;
}

// -----------------------------------------------------------------------
// Node shape: returns SVG path data
// -----------------------------------------------------------------------
function nodeShape(d, r) {
  const type = d.type;
  if (INFRA_TYPES.has(type)) {
    // Diamond
    return `M0,${-r} L${r},0 L0,${r} L${-r},0 Z`;
  } else if (DATA_TYPES.has(type)) {
    // Square (rounded-ish)
    const s = r * 0.8;
    return `M${-s},${-s} L${s},${-s} L${s},${s} L${-s},${s} Z`;
  } else {
    // Circle approximation via path (12-sided polygon for consistency)
    const pts = [];
    for (let i = 0; i < 12; i++) {
      const a = (Math.PI * 2 * i) / 12;
      pts.push(`${r * Math.cos(a)},${r * Math.sin(a)}`);
    }
    return `M${pts.join('L')}Z`;
  }
}

// -----------------------------------------------------------------------
// Update graph rendering
// -----------------------------------------------------------------------
function updateGraph() {
  const { nodes, edges } = getFilteredData();
  const edgeCounts = computeEdgeCounts(nodes, edges);

  // Prepare links (must use source/target for D3)
  const links = edges.map(e => ({
    source: e.source_id || e.source,
    target: e.target_id || e.target,
    type: e.type,
    description: e.description || '',
    confidence: e.confidence,
    is_stale: e.is_stale,
    group: EDGE_TYPE_TO_GROUP[e.type] || 'structural',
  }));

  // --- Edges ---
  const edgeGroups = linkG.selectAll('.edge-group')
    .data(links, d => `${d.source}-${d.target}-${d.type}`);

  edgeGroups.exit().remove();

  const edgeEnter = edgeGroups.enter()
    .append('g')
    .attr('class', 'edge-group');

  edgeEnter.append('line')
    .attr('class', 'edge-line');

  edgeEnter.append('text')
    .attr('class', 'edge-label');

  const edgeMerged = edgeEnter.merge(edgeGroups);

  edgeMerged.select('.edge-line')
    .attr('stroke', d => EDGE_GROUP_COLORS[d.group] || '#888')
    .attr('stroke-dasharray', d => d.is_stale ? '4,3' : null)
    .attr('marker-end', d => `url(#arrow-${d.group})`);

  edgeMerged.select('.edge-label')
    .text(d => d.type);

  // --- Nodes ---
  const nodeGroups = nodeG.selectAll('.node-group')
    .data(nodes, d => d.id);

  nodeGroups.exit().remove();

  const nodeEnter = nodeGroups.enter()
    .append('g')
    .attr('class', 'node-group');

  nodeEnter.append('path')
    .attr('class', 'node-shape');

  nodeEnter.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => {
      const r = nodeRadius(edgeCounts[d.id] || 0);
      return r + 12;
    });

  // Drag
  nodeEnter.call(d3.drag()
    .on('start', dragStarted)
    .on('drag', dragged)
    .on('end', dragEnded));

  // Click
  nodeEnter.on('click', (event, d) => {
    event.stopPropagation();
    selectNode(d);
  });

  // Hover tooltip
  nodeEnter
    .on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip);

  const nodeMerged = nodeEnter.merge(nodeGroups);

  nodeMerged.select('.node-shape')
    .attr('d', d => {
      const r = nodeRadius(edgeCounts[d.id] || 0);
      return nodeShape(d, r);
    })
    .attr('fill', d => {
      const tier = d.tier || NODE_TIER[d.type] || 'micro';
      return TIER_COLORS[tier] || '#FF8C42';
    })
    .attr('stroke', d => d.is_stale ? '#e74c3c' : 'rgba(255,255,255,0.2)')
    .attr('stroke-width', d => d.is_stale ? 2 : 1)
    .attr('stroke-dasharray', d => d.is_stale ? '4,2' : null)
    .attr('opacity', d => {
      if (filters.search && !d.name.toLowerCase().includes(filters.search) &&
          !d.id.toLowerCase().includes(filters.search)) return 0.3;
      return 0.85;
    });

  nodeMerged.select('.node-label')
    .text(d => truncate(d.name, 18))
    .attr('dy', d => {
      const r = nodeRadius(edgeCounts[d.id] || 0);
      return r + 12;
    });

  // Update selected highlight
  nodeMerged.classed('node-selected', d => d.id === selectedNodeId);

  // Apply live update highlight classes
  nodeMerged
    .classed('node-added', d => d._highlightClass === 'node-added')
    .classed('node-modified', d => d._highlightClass === 'node-modified')
    .classed('node-removed', d => d._highlightClass === 'node-removed');

  // Remove highlight classes after animation completes
  if (_liveUpdateEnabled) {
    setTimeout(() => {
      nodeG.selectAll('.node-group')
        .classed('node-added', false)
        .classed('node-modified', false)
        .classed('node-removed', false);
      // Clear highlight class from data
      nodes.forEach(n => n._highlightClass = null);
    }, 3000); // Clear after 3 seconds
  }

  // Restart simulation — lower alpha = settles faster = less CPU
  simulation.nodes(nodes);
  simulation.force('link').links(links);
  simulation.alpha(0.4).restart();
}

function nodeRadius(edgeCount) {
  return Math.max(6, Math.min(20, 6 + edgeCount * 1.5));
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len - 1) + '\u2026' : str;
}

// -----------------------------------------------------------------------
// Simulation tick
// -----------------------------------------------------------------------
let _tickFrame = null;
function ticked() {
  // Throttle DOM updates to animation frames
  if (_tickFrame) return;
  _tickFrame = requestAnimationFrame(() => {
    _tickFrame = null;

    // Update edge lines
    linkG.selectAll('.edge-line')
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    // Update edge labels only when simulation is nearly done (saves CPU)
    if (simulation.alpha() < 0.1) {
      linkG.selectAll('.edge-label')
        .attr('x', d => (d.source.x + d.target.x) / 2)
        .attr('y', d => (d.source.y + d.target.y) / 2 - 4);
    }

    // Update nodes
    nodeG.selectAll('.node-group')
      .attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// -----------------------------------------------------------------------
// Drag handlers
// -----------------------------------------------------------------------
function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

function showTooltip(event, d) {
  const tier = d.tier || NODE_TIER[d.type] || 'micro';

  const rect = container.getBoundingClientRect();
  tooltipEl.style.left = (event.clientX - rect.left + 12) + 'px';
  tooltipEl.style.top = (event.clientY - rect.top - 10) + 'px';
}

function hideTooltip() {
  tooltipEl.style.display = 'none';
}

function selectNode(d) {
  selectedNodeId = d.id;

  // Update highlight
  nodeG.selectAll('.node-group').classed('node-selected', n => n.id === d.id);

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('empty');

  const tier = d.tier || NODE_TIER[d.type] || 'micro';
  const tags = (d.tags || []).map(t => `<span class="tag-badge">${t}</span>`).join(' ') || '-';

  // Count edges for this node from raw data
  const inEdges = rawData.edges.filter(e => (e.target_id || e.target) === d.id);
  const outEdges = rawData.edges.filter(e => (e.source_id || e.source) === d.id);

  panel.innerHTML = `
    <h3>${d.name}</h3>
    <div class="detail-grid">
      <span class="label">ID</span><span class="value">${d.id}</span>
      <span class="label">Type</span><span class="value">${d.type}</span>
      <span class="label">Tier</span><span class="value" style="color:${TIER_COLORS[tier]}">${tier}</span>
      <span class="label">Confidence</span><span class="value">${(d.confidence * 100).toFixed(0)}%</span>
      <span class="label">Provenance</span><span class="value">${d.provenance || '-'}</span>
      <span class="label">Language</span><span class="value">${d.language || '-'}</span>
      <span class="label">Stale</span><span class="value" style="color:${d.is_stale ? '#e74c3c' : '#2ecc71'}">${d.is_stale ? 'Yes' : 'No'}</span>
      <span class="label">Version</span><span class="value">${d.version || 1}</span>
      <span class="label">Edges In</span><span class="value">${inEdges.length}</span>
      <span class="label">Edges Out</span><span class="value">${outEdges.length}</span>
      <span class="label">Tags</span><span class="value">${tags}</span>
      <span class="label">Description</span><span class="value">${d.description || '-'}</span>
    </div>
  `;
}

// -----------------------------------------------------------------------
// Live Updates via Server-Sent Events (SSE)
// -----------------------------------------------------------------------
let _liveUpdateEnabled = false;
let _eventSource = null;
let _updateBanner = null;
let _highlightData = null; // Track which nodes to highlight

function initLiveUpdates() {
  _eventSource = new EventSource('/api/events');
  _eventSource.addEventListener('graph-updated', (e) => {
    const data = JSON.parse(e.data);
    console.log('[LIVE] Graph updated:', data);
    _liveUpdateEnabled = true;
    showWatchIndicator(true); // Show watch indicator when updates start coming
    showUpdateBanner(data);

    // Store highlight info for reloadGraph to use
    _highlightData = {
      added: data.nodes_added || 0,
      removed: data.nodes_removed || 0,
      affected: data.nodes_affected || []
    };

    reloadGraph();
  });
  _eventSource.onerror = () => {
    // SSE not available (server doesn't support watch mode) — silently ignore
    if (_eventSource.readyState === EventSource.CLOSED) {
      console.log('[LIVE] SSE not available');
    }
  };
}

function showWatchIndicator(visible) {
  const indicator = document.getElementById('watch-status');
  if (indicator) {
    indicator.style.display = visible ? 'flex' : 'none';
  }
}

async function stopWatcher() {
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const graphPath = urlParams.get('graph');

    const resp = await fetch('/api/watch-stop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ graph_path: graphPath })
    });

    const result = await resp.json();
    if (result.success) {
      showWatchIndicator(false);
      console.log('[LIVE] Watcher stopped');

      // Close SSE connection
      if (_eventSource) {
        _eventSource.close();
        _eventSource = null;
      }
    }
  } catch (e) {
    console.error('Failed to stop watcher:', e);
  }
}

function showUpdateBanner(data) {
  if (!_updateBanner) {
    _updateBanner = document.createElement('div');
    _updateBanner.id = 'live-banner';
    _updateBanner.style.cssText = `
      position: fixed; top: 8px; right: 8px; z-index: 1000;
      background: #1a1a2e; border: 1px solid #4ecca3; border-radius: 8px;
      padding: 8px 14px; color: #4ecca3; font-size: 12px;
      font-family: monospace; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; max-width: 320px;
    `;
    document.body.appendChild(_updateBanner);
  }
  const files = data.changed_files.map(f => f.split('/').pop()).join(', ');
  _updateBanner.innerHTML = `
    <span style="color:#e94560">LIVE</span>
    ${files} &mdash;
    +${data.nodes_added} -${data.nodes_removed} nodes,
    ${data.nodes_stale} stale
    <span style="color:#666">(${Math.round(data.duration_ms)}ms)</span>
  `;
  _updateBanner.style.opacity = '1';
  setTimeout(() => { _updateBanner.style.opacity = '0'; }, 4000);
}

async function reloadGraph() {
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const graphPath = urlParams.get('graph');
    const apiUrl = graphPath ? `/api/graph?path=${encodeURIComponent(graphPath)}` : '/api/graph';
    const resp = await fetch(apiUrl);
    if (!resp.ok) return;
    const newData = await resp.json();

    // Track which nodes are new (for highlighting)
    const oldNodeIds = new Set(rawData.nodes.map(n => n.id));
    const newNodeIds = new Set(newData.nodes.map(n => n.id));
    const addedNodeIds = new Set([...newNodeIds].filter(id => !oldNodeIds.has(id)));

    // Preserve positions from existing nodes
    const posMap = {};
    for (const n of rawData.nodes) {
      if (n.x !== undefined) posMap[n.id] = { x: n.x, y: n.y, vx: n.vx, vy: n.vy };
    }

    rawData = newData;

    // Normalize tiers and mark highlight status
    for (const node of rawData.nodes) {
      if (!node.tier) node.tier = NODE_TIER[node.type] || 'micro';

      // Mark nodes for highlighting
      node._highlightClass = null;
      if (_highlightData) {
        if (addedNodeIds.has(node.id)) {
          node._highlightClass = 'node-added';
        } else if (_highlightData.affected && _highlightData.affected.includes(node.id)) {
          node._highlightClass = 'node-modified';
        }
      }

      // Restore position if node existed before (smooth transition)
      if (posMap[node.id]) {
        node.x = posMap[node.id].x;
        node.y = posMap[node.id].y;
        node.vx = posMap[node.id].vx;
        node.vy = posMap[node.id].vy;
      }
    }

    // Clear highlight data after applying
    _highlightData = null;

    // Update filters for any new types
    const nodeTypes = new Set(rawData.nodes.map(n => n.type));
    for (const t of nodeTypes) {
      if (!(t in filters.nodeType)) filters.nodeType[t] = true;
    }

    updateGraph();
    updateStats();
  } catch (err) {
    console.error('[LIVE] Reload failed:', err);
  }
}

// HTTP method → function name mappings for more specific matching
const METHOD_FUNCTION_HINTS = {
  '/api/products': {
    'DELETE': { functions: ['deleteProduct', 'authMiddleware'], flow: ['deleteProduct', 'products.js', 'authMiddleware', 'Product.js'] },
    'POST':   { functions: ['showProductModal', 'authMiddleware'], flow: ['showProductModal', 'products.js', 'authMiddleware', 'Product.js'] },

  },

    'GET':    { functions: ['loadOrders', 'getCache'], flow: ['app.js', 'orders.js', 'getCache'] },
  },

    'PUT':    { functions: ['emitEvent'], flow: ['app.js', 'users.js', 'User.js'] },

};

const PATH_TO_FILE_HINTS = {
  '/api/products': { files: ['products.js', 'Product.js'], flow: ['app.js', 'products.js', 'Product.js'] },
  '/api/orders':   { files: ['orders.js', 'Order.js'],     flow: ['app.js', 'orders.js', 'Order.js'] },
  '/api/users':    { files: ['users.js', 'User.js'],       flow: ['app.js', 'users.js', 'User.js'] },
  '/api/webhooks': { files: ['webhooks.js'],                flow: ['app.js', 'webhooks.js'] },
  '/api/admin':    { files: ['admin.js'],                   flow: ['app.js', 'admin.js'] },
};

function findMatchingNodeIds(runtimeEvent) {
  const matched = new Set();

  if (runtimeEvent.type === 'domain_event') {
    const hints = EVENT_TO_NODE_HINTS[runtimeEvent.event_name];
    if (hints) {
      for (const node of rawData.nodes) {
        // Match file nodes
        if (hints.files.some(f => node.name === f)) matched.add(node.id);
        // Match Event nodes
        if (node.type === 'Event' && hints.names.some(n => node.name === n)) matched.add(node.id);
        // Match function nodes (the sub-items inside files)
        if (node.type === 'Function' && hints.functions && hints.functions.some(f => node.name === f)) matched.add(node.id);
      }
    }
    for (const node of rawData.nodes) {
      if (node.name === 'eventBus.js') matched.add(node.id);
    }
  }

  if (runtimeEvent.type === 'http_request') {
    const path = runtimeEvent.path.split('?')[0];
    const method = runtimeEvent.method;

    for (const [prefix, hint] of Object.entries(PATH_TO_FILE_HINTS)) {
      if (path.startsWith(prefix)) {
        // Match file nodes
        for (const node of rawData.nodes) {
          if (hint.files.some(f => node.name === f)) matched.add(node.id);
        }

        // Match method-specific function nodes
        const methodHints = METHOD_FUNCTION_HINTS[prefix];
        if (methodHints && methodHints[method]) {
          for (const node of rawData.nodes) {
            if (node.type === 'Function' && methodHints[method].functions.some(f => node.name === f)) {
              matched.add(node.id);
            }
          }
        }
        break;
      }
    }
    // Also match app.js for HTTP requests
    for (const node of rawData.nodes) {
      if (node.name === 'app.js') matched.add(node.id);
    }
  }

  return matched;
}

// Get ordered flow path for an event (returns array of node data objects)
function getFlowPath(runtimeEvent) {
  let flowNames = [];

  if (runtimeEvent.type === 'domain_event') {
    const hints = EVENT_TO_NODE_HINTS[runtimeEvent.event_name];
    if (hints && hints.flow) flowNames = hints.flow;
  } else if (runtimeEvent.type === 'http_request') {
    const path = runtimeEvent.path.split('?')[0];
    const method = runtimeEvent.method;

    // Try method-specific flow first
    for (const [prefix, methodMap] of Object.entries(METHOD_FUNCTION_HINTS)) {
      if (path.startsWith(prefix) && methodMap[method] && methodMap[method].flow) {
        flowNames = methodMap[method].flow;
        break;
      }
    }

    // Fallback to generic path flow
    if (flowNames.length === 0) {
      for (const [prefix, hint] of Object.entries(PATH_TO_FILE_HINTS)) {
        if (path.startsWith(prefix)) {
          flowNames = hint.flow || [];
          break;
        }
      }
    }
  }

  // Resolve flow names to actual positioned nodes
  const flowNodes = [];
  const nodeMap = {};
  nodeG.selectAll('.node-group').each(function(d) { nodeMap[d.name] = d; });

  for (const name of flowNames) {
    if (nodeMap[name]) flowNodes.push(nodeMap[name]);
  }

  return flowNodes;
}

let _runtimeBanner = null;
let _runtimeEventCount = 0;
let _activeGlowTimers = []; // Track active glow timers for cleanup
let _activeFlowElements = []; // Track flow path SVG elements

function showRuntimeRipple(nodeIds, runtimeEvent) {
  const matchedNodes = [];
  nodeG.selectAll('.node-group').each(function(d) {
    if (nodeIds.has(d.id)) matchedNodes.push({ el: this, d: d });
  });

  // 1. Add persistent glow class to matched nodes (stays for 8s)
  for (const { el } of matchedNodes) {
    const group = d3.select(el);
    group.classed('node-runtime-active', true);
  }

  // Schedule glow removal after 8s
  const glowTimer = setTimeout(() => {
    for (const { el } of matchedNodes) {
      d3.select(el).classed('node-runtime-active', false);
    }
  }, 8000);
  _activeGlowTimers.push(glowTimer);

  // 2. Expanding ripple rings (on top of persistent glow)
  for (const { el } of matchedNodes) {
    const group = d3.select(el);

    group.append('circle')
      .attr('class', 'runtime-ripple')
      .attr('cx', 0).attr('cy', 0).attr('r', 8)
      .attr('stroke', '#ff6b6b').attr('stroke-width', 3).attr('opacity', 0.9)
      .transition().duration(1500)
      .attr('r', 45).attr('stroke-width', 0.5).attr('opacity', 0)
      .remove();

    setTimeout(() => {
      group.append('circle')
        .attr('class', 'runtime-ripple')
        .attr('cx', 0).attr('cy', 0).attr('r', 8)
        .attr('stroke', '#ff6b6b').attr('stroke-width', 2).attr('opacity', 0.6)
        .transition().duration(1500)
        .attr('r', 45).attr('stroke-width', 0.5).attr('opacity', 0)
        .remove();
    }, 400);
  }

  // 3. Floating event label (larger, stays longer) with payload detail
  if (matchedNodes.length > 0) {
    const p = matchedNodes[0].d;
    let label, detail;

    if (runtimeEvent.type === 'domain_event') {
      label = runtimeEvent.event_name;
      detail = formatPayload(runtimeEvent.payload);
    } else {
      label = `${runtimeEvent.method} ${runtimeEvent.path}`;
      detail = `${runtimeEvent.status}`;
    }

    // Main label
    g.append('text')
      .attr('x', p.x).attr('y', p.y - 30)
      .text(label)
      .style('font-size', '13px').style('font-weight', '700')
      .style('fill', '#ff6b6b').style('text-anchor', 'middle')
      .style('pointer-events', 'none')
      .style('text-shadow', '0 0 8px rgba(255,107,107,0.6)')
      .transition().duration(5000)
      .attr('y', p.y - 65).style('opacity', 0)
      .remove();

    // Detail line (product name, order id, etc)
    if (detail) {
      g.append('text')
        .attr('x', p.x).attr('y', p.y - 16)
        .text(detail)
        .style('font-size', '11px').style('font-weight', '400')
        .style('fill', '#ff9f43').style('text-anchor', 'middle')
        .style('pointer-events', 'none')
        .transition().duration(5000)
        .attr('y', p.y - 51).style('opacity', 0)
        .remove();
    }
  }

  // 4. Draw animated flow path between nodes
  const flowNodes = getFlowPath(runtimeEvent);
  if (flowNodes.length >= 2) {
    showFlowPath(flowNodes);
  }
}

function showFlowPath(flowNodes) {
  // Create a group for the flow path
  const flowG = g.append('g').attr('class', 'runtime-flow-group');
  _activeFlowElements.push(flowG);

  // Draw animated dashed lines between consecutive flow nodes
  for (let i = 0; i < flowNodes.length - 1; i++) {
    const src = flowNodes[i];
    const tgt = flowNodes[i + 1];

    // Animated dashed line
    flowG.append('line')
      .attr('class', 'runtime-flow-line')
      .attr('x1', src.x).attr('y1', src.y)
      .attr('x2', src.x).attr('y2', src.y) // Start from source
      .transition().duration(300).delay(i * 200)
      .attr('x2', tgt.x).attr('y2', tgt.y); // Animate to target

    // Arrow head at midpoint
    const mx = (src.x + tgt.x) / 2;
    const my = (src.y + tgt.y) / 2;
    const angle = Math.atan2(tgt.y - src.y, tgt.x - src.x) * 180 / Math.PI;

    flowG.append('polygon')
      .attr('class', 'runtime-flow-arrow')
      .attr('points', '0,-5 10,0 0,5')
      .attr('transform', `translate(${mx},${my}) rotate(${angle})`)
      .attr('opacity', 0)
      .transition().delay(i * 200 + 200).duration(200)
      .attr('opacity', 0.8);

    // Step number at midpoint
    flowG.append('text')
      .attr('x', mx).attr('y', my - 10)
      .text(i + 1)
      .style('font-size', '9px').style('fill', '#ff6b6b')
      .style('text-anchor', 'middle').style('font-weight', '700')
      .style('pointer-events', 'none')
      .attr('opacity', 0)
      .transition().delay(i * 200 + 200).duration(200)
      .attr('opacity', 0.7);
  }

  // Remove flow path after 6s
  setTimeout(() => {
    flowG.transition().duration(1000).style('opacity', 0).remove();
    _activeFlowElements = _activeFlowElements.filter(e => e !== flowG);
  }, 6000);
}

function showRuntimeBanner(data) {
  if (!_runtimeBanner) {
    _runtimeBanner = document.createElement('div');
    _runtimeBanner.id = 'runtime-banner';
    document.body.appendChild(_runtimeBanner);
  }

  let msg = '';
  if (data.type === 'domain_event') {
    const detail = formatPayload(data.payload);
    msg = `<span style="color:#ff9f43">EVENT</span> ${data.event_name}${detail ? ` <span style="color:#e0e0e0">${detail}</span>` : ''}`;
  } else if (data.type === 'http_request') {
    const sc = data.status < 400 ? '#4ecca3' : '#e94560';
    msg = `<span style="color:${sc}">${data.method} ${data.path}</span> ${data.status} (${data.duration_ms}ms)`;
  }

  _runtimeBanner.innerHTML = msg;
  _runtimeBanner.style.opacity = '1';
  clearTimeout(_runtimeBanner._timer);
  _runtimeBanner._timer = setTimeout(() => { _runtimeBanner.style.opacity = '0'; }, 4000);
}

// Format event payload for display
function formatPayload(payload) {
  if (!payload) return '';
  const parts = [];
  if (payload.name) parts.push(payload.name);
  else if (payload.productId) parts.push(`id: ${payload.productId}`);
  else if (payload.orderId) parts.push(`order: ${payload.orderId}`);
  else if (payload.userId) parts.push(`user: ${payload.userId}`);
  if (payload.total) parts.push(`$${payload.total}`);
  if (payload.itemCount) parts.push(`${payload.itemCount} items`);
  return parts.join(' | ');
}

// Runtime activity log in sidebar
const _runtimeLog = [];
const MAX_LOG_ENTRIES = 20;

function addRuntimeLogEntry(data, matchedNodeIds) {
  const log = document.getElementById('runtime-log');
  const emptyMsg = document.getElementById('runtime-log-empty');

  // Build entry
  const entry = document.createElement('div');
  entry.className = 'runtime-log-entry';

  const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  let typeHtml = '';
  let detailHtml = '';

  if (data.type === 'domain_event') {
    typeHtml = `<span class="rle-type rle-event">EVENT</span>`;
    const payloadSummary = formatPayload(data.payload);
    detailHtml = `${data.event_name}${payloadSummary ? `<br><span style="color:var(--text-muted);font-size:10px">${payloadSummary}</span>` : ''}`;
  } else if (data.type === 'http_request') {
    const cls = data.status >= 400 ? 'rle-http-err' : 'rle-http';
    typeHtml = `<span class="rle-type ${cls}">${data.method}</span>`;
    detailHtml = `${data.path} <span style="color:var(--text-muted)">${data.status} (${data.duration_ms}ms)</span>`;
  }

  // Resolve matched node names
  const matchedNames = [];
  nodeG.selectAll('.node-group').each(function(d) {
    if (matchedNodeIds.has(d.id)) matchedNames.push(d.name);
  });

  const nodeTags = matchedNames.map(n =>
    `<span class="rle-node-tag" data-node-name="${n}">${n}</span>`
  ).join('');

  entry.innerHTML = `
    <span class="rle-time">${time}</span>
    ${typeHtml} ${detailHtml}
    <span class="rle-nodes">${nodeTags || '<i>no matched nodes</i>'}</span>
  `;

  // Click node tags to highlight them on graph
  entry.querySelectorAll('.rle-node-tag').forEach(tag => {
    tag.addEventListener('click', (e) => {
      e.stopPropagation();
      const name = tag.dataset.nodeName;
      // Find and select the node
      nodeG.selectAll('.node-group').each(function(d) {
        if (d.name === name) selectNode(d);
      });
    });
  });

  // Click the entry itself to re-highlight involved nodes
  entry.addEventListener('click', () => {
    highlightNodesTemporarily(matchedNodeIds, 5000);
  });

  // Prepend entry (newest first)
  log.insertBefore(entry, log.firstChild);
  log.classList.add('has-events');
  if (emptyMsg) emptyMsg.style.display = 'none';

  // Trim old entries
  while (log.children.length > MAX_LOG_ENTRIES) {
    log.removeChild(log.lastChild);
  }
}

function highlightNodesTemporarily(nodeIds, durationMs) {
  nodeG.selectAll('.node-group').each(function(d) {
    if (nodeIds.has(d.id)) {
      d3.select(this).classed('node-runtime-active', true);
    }
  });
  setTimeout(() => {
    nodeG.selectAll('.node-group').each(function(d) {
      if (nodeIds.has(d.id)) {
        d3.select(this).classed('node-runtime-active', false);
      }
    });
  }, durationMs);
}

function initRuntimeLayer() {
  if (!_eventSource) return;

  _eventSource.addEventListener('runtime-activity', (e) => {
    const data = JSON.parse(e.data);
    console.log('[RUNTIME]', data.type, data.event_name || data.path);

    const nodeIds = findMatchingNodeIds(data);
    if (nodeIds.size > 0) showRuntimeRipple(nodeIds, data);
    showRuntimeBanner(data);
    addRuntimeLogEntry(data, nodeIds);

    _runtimeEventCount++;
    const indicator = document.getElementById('runtime-status');
    if (indicator) {
      indicator.classList.add('active');
      document.getElementById('runtime-event-count').textContent =
        `${_runtimeEventCount} event${_runtimeEventCount !== 1 ? 's' : ''}`;
    }
  });
}

// -----------------------------------------------------------------------
// Boot
// -----------------------------------------------------------------------
loadData();
initLiveUpdates();
initRuntimeLayer();

</script>
